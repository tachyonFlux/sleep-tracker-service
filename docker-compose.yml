# Drop this service into your existing Synology compose stack (next to Vikunja).
# Keep it on the LAN / behind your existing reverse proxy or VPN; the phone
# reaches it the same way it reaches Vikunja. No GPU, minimal deps.
services:
  sleep-tracker:
    build: .
    # Or, if you push an image to a registry:
    # image: youruser/sleep-tracker-service:latest
    container_name: sleep-tracker
    user: 1026:100
    restart: unless-stopped
    ports:
      - "8765:8000"          # host:container — pick an unused host port
    volumes:
      - /volume1/docker/sleep-tracker/data:/data         # raw nights + hypnograms (SQLite)
    environment:
      - SLEEP_DB_PATH=/data/sleep.db
